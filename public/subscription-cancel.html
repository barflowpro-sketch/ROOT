<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription Cancelled — Root</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #292524; color: #f5f5f4; font-family: -apple-system, sans-serif;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { background: #44403c; border: 1px solid #57534e; border-radius: 20px;
            padding: 40px 32px; max-width: 380px; width: 100%; text-align: center; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: #a8a29e; line-height: 1.6; margin-bottom: 28px; }
    .btn { display: block; background: #b45309; color: #fff8eb; border: none;
           border-radius: 14px; padding: 16px; font-size: 15px; font-weight: 600;
           text-decoration: none; cursor: pointer; }
    .btn:hover { background: #d97706; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">↩</div>
    <h1>No worries</h1>
    <p>You cancelled the subscription process. You can subscribe anytime from your Root dashboard.</p>
    <a href="/" class="btn">Return to Root</a>
  </div>
</body>
</html>
