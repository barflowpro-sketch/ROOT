<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription Active — Root</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #292524; color: #f5f5f4; font-family: -apple-system, sans-serif;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { background: #44403c; border: 1px solid #57534e; border-radius: 20px;
            padding: 40px 32px; max-width: 380px; width: 100%; text-align: center; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: #a8a29e; line-height: 1.6; margin-bottom: 28px; }
    .badge { display: inline-block; background: #166534; color: #86efac;
             font-size: 12px; font-weight: 600; padding: 6px 16px; border-radius: 99px; margin-bottom: 24px; }
    .btn { display: block; background: #b45309; color: #fff8eb; border: none;
           border-radius: 14px; padding: 16px; font-size: 15px; font-weight: 600;
           text-decoration: none; cursor: pointer; }
    .btn:hover { background: #d97706; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <span class="badge">Free Trial Started</span>
    <h1>You're all set!</h1>
    <p>Your 14-day free trial has started. Your profile is now visible to clients. You won't be charged until the trial ends — $17.99/month after that, automatically.</p>
    <a href="/" class="btn">Return to Root</a>
  </div>
</body>
</html>
